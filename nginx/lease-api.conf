# /etc/nginx/sites-available/lease-api
# Symlink: ln -s /etc/nginx/sites-available/lease-api /etc/nginx/sites-enabled/
#
# Prerequisites:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.yourdomain.com
#
# Replace YOUR_DOMAIN with your actual domain before using.

# ── Rate-limit zones (shared memory) ────────────────────────────────────────
# General API: 30 r/m per IP
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
# Auth endpoints: 10 r/m per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main block ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS (managed by Certbot – do not edit these lines manually) ──────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (complement helmet in Express) ──────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # ── Hide server info ─────────────────────────────────────────────────────
    server_tokens off;

    # ── Max request body (match Express / multer limits) ─────────────────────
    client_max_body_size 10M;

    # ── Auth routes – tighter rate limit, no burst ───────────────────────────
    location ~ ^/api/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        include            /etc/nginx/proxy_params;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other API routes ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=15 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        include            /etc/nginx/proxy_params;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Uploads (static files served by Express) ─────────────────────────────
    location /uploads/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        include            /etc/nginx/proxy_params;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block direct access to everything else ────────────────────────────────
    location / {
        return 444;
    }
}
